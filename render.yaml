# Render Blueprint — ONE web service that serves the REST API, the live
# Socket.IO connections, and the built client from a single origin.
# After deploy, set MONGODB_URI. The grid only needs seeding once (see
# docs/DEPLOYMENT.md); an existing Atlas database is already seeded.
services:
  - name: conquerorgrid
    type: web
    runtime: node
    plan: free # NOTE: free instances sleep when idle, which drops open
    # sockets. Bump to a paid plan to keep the realtime board alive.
    buildCommand: npm install && npm run build
    startCommand: node server/src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false # your MongoDB Atlas connection string
      - key: GRID_COLS
        value: "30"
      - key: GRID_ROWS
        value: "24"
      - key: CLAIM_COOLDOWN
        value: "3"
      - key: ENFORCE_ADJACENCY
        value: "true"
    # PORT is injected by Render; the server reads process.env.PORT.
    # CLIENT_ORIGIN is optional — same-origin deploy reflects any origin.
